name: Build and Release Miaospeed

on:
  workflow_dispatch:
    inputs:
      force_reset_token:
        description: '⚠️ 强制重新生成 TOKEN (选填：仅当您想换一个新 TOKEN 时才勾选此项)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.21'

      - name: Clone Miaospeed Repository
        run: git clone https://github.com/AirportR/miaospeed.git

      - name: Generate or Load TOKEN and Embedded Files
        run: |
          if [ "${{ inputs.force_reset_token }}" == "true" ] || [ ! -f "BUILDTOKEN.txt" ]; then
              echo "需要生成全新的 8 段式 TOKEN..."
              FULL_TOKEN=""
              for i in {1..8}; do
                  PART=$(uuidgen | tr -d '-' | cut -c 1-16)
                  if [ -z "$FULL_TOKEN" ]; then
                      FULL_TOKEN="$PART"
                  else
                      FULL_TOKEN="${FULL_TOKEN}|${PART}"
                  fi
              done
              echo "$FULL_TOKEN" > BUILDTOKEN.txt
          else
              echo "检测到仓库中已有 BUILDTOKEN.txt，将继续使用现有 TOKEN..."
          fi
          
          FULL_TOKEN=$(cat BUILDTOKEN.txt)
          echo "BUILD_TOKEN=$FULL_TOKEN" >> $GITHUB_ENV
          
          mkdir -p miaospeed/utils/embeded/
          echo "$FULL_TOKEN" > miaospeed/utils/embeded/BUILDTOKEN.key

          # ----------------- 生成 mTLS 证书 -----------------
          cd miaospeed
          mkdir -p preconfigs/embeded/miaokoCA/
          openssl genrsa -out preconfigs/embeded/miaokoCA/miaoko.key 2048
          openssl req -new -x509 -days 3650 -key preconfigs/embeded/miaokoCA/miaoko.key -out preconfigs/embeded/miaokoCA/miaoko.crt -subj "/C=CN/ST=State/L=City/O=Miaoko/OU=Dev/CN=miaospeed"
          cp /etc/ssl/certs/ca-certificates.crt preconfigs/embeded/

      - name: Build Miaospeed for Multiple Platforms
        run: |
          cd miaospeed
          go mod download
          
          mkdir -p ../build_artifacts
          
          # 支持架构：普通VPS, ARM服务器/RK3588, 老32位ARM, 软路由MIPS, Windows, Mac
          PLATFORMS="linux/amd64 linux/arm64 linux/arm linux/mipsle windows/amd64 windows/arm64 darwin/amd64 darwin/arm64"
          
          for PLATFORM in $PLATFORMS; do
            GOOS=${PLATFORM%/*}
            GOARCH=${PLATFORM#*/}
            
            OUTPUT_NAME="miaospeed_${GOOS}_${GOARCH}"
            
            if [ "$GOOS" = "windows" ]; then
              OUTPUT_NAME="${OUTPUT_NAME}.exe"
            fi
            
            echo "正在编译 $OUTPUT_NAME ..."
            # 针对 32位 ARM，默认使用 GOARM=7 以获得最佳兼容性
            if [ "$GOARCH" = "arm" ]; then
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH GOARM=7 go build -ldflags "-s -w" -o ../build_artifacts/$OUTPUT_NAME .
            else
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o ../build_artifacts/$OUTPUT_NAME .
            fi
          done

      - name: Generate and Commit README.md and TOKEN
        run: |
          cat <<EOF > README.md
          # Miaospeed 自动化编译发行版

          这是由 GitHub Actions 自动化构建的 \`miaospeed\` 服务端程序。已内置所需的 mTLS 证书与验证配置。

          ## 支持的平台架构
          - **Linux (VPS / 开发板 / 软路由)**: 
            - \`amd64\` (常规Intel/AMD服务器)
            - \`arm64\` (Rockchip RK3588/RK3568, 树莓派4/5, Oracle ARM等64位设备)
            - \`arm\` (老旧32位ARM设备或电视盒子)
            - \`mipsle\` (部分基于 OpenWrt 的路由器)
          - **Windows**: \`amd64\`, \`arm64\`
          - **macOS (Darwin)**: \`amd64\` (Intel), \`arm64\` (Apple Silicon)

          ## 编译信息
          - **构建时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **当前 BUILD TOKEN**: 
          \`\`\`text
          $BUILD_TOKEN
          \`\`\`
          
          *此 TOKEN 已固定。如果需要更换，请在触发 Actions 时勾选「强制重新生成 TOKEN」选项。*
          EOF
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md BUILDTOKEN.txt
          git commit -m "docs: Auto-update README and TOKEN [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +'%Y%m%d%H%M%S')"
          
          # 一键打包并发布 build_artifacts 目录下的所有文件
          gh release create "$TAG_NAME" build_artifacts/* \
            --title "Miaospeed Auto Build $TAG_NAME" \
            --notes "自动化编译发布。支持多平台架构。对应的 BUILD TOKEN 请查看仓库主页的 README.md 文件。"